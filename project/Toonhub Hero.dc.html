<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; }
  a { color: inherit; text-decoration: none; }
  a:hover { color: inherit; }
</style>
</helmet>

<div style="position: relative; width: 100%; height: 100vh; overflow: hidden; font-family: 'Inter', sans-serif; background-color: {{ activeBg }}; transition: background-color 650ms cubic-bezier(0.4,0,0.2,1);">

  <!-- Center accent panel -->
  <div aria-hidden="true" style="position:absolute; left:50%; top:8%; transform:translateX(-50%); width:min(46%, 780px); height:78%; border-radius:28px; background-color: {{ activePanel }}; transition: background-color 650ms cubic-bezier(0.4,0,0.2,1); z-index:1;"></div>

  <!-- Giant ghost text -->
  <div style="position:absolute; left:0; right:0; top:18%; display:flex; align-items:center; justify-content:center; pointer-events:none; user-select:none; z-index:2;">
    <span style="font-family:'Anton', sans-serif; font-size:clamp(90px, 28vw, 380px); font-weight:900; color:#ffffff; opacity:0.22; line-height:1; text-transform:uppercase; letter-spacing:-0.02em; white-space:nowrap;">3D SHAPE</span>
  </div>

  <!-- Top-left brand -->
  <div style="position:absolute; top:24px; left:16px; z-index:60;">
    <span style="font-size:12px; font-weight:600; text-transform:uppercase; color:#ffffff; opacity:0.9; letter-spacing:0.18em;">TOONHUB</span>
  </div>

  <!-- Carousel -->
  <div style="position:absolute; inset:0; z-index:3;">
    <sc-for list="{{ items }}" as="item" hint-placeholder-count="4">
      <div style="{{ item.style }}">
        <img src="{{ item.src }}" draggable="false" style="width:100%; height:100%; object-fit:contain; object-position:bottom center;" alt="">
      </div>
    </sc-for>
  </div>

  <!-- Grain overlay -->
  <div aria-hidden="true" style="position:absolute; inset:0; pointer-events:none; z-index:50; opacity:0.4; background-size:200px 200px; background-repeat:repeat; background-image:url('data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22200%22><filter id=%22n%22><feTurbulence type=%22fractalNoise%22 baseFrequency=%220.9%22 numOctaves=%224%22 stitchTiles=%22stitch%22/></filter><rect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23n)%22 opacity=%220.08%22/></svg>');"></div>

  <!-- Bottom-left copy + nav -->
  <div style="position:absolute; bottom:24px; left:24px; z-index:60; max-width:340px; color:#ffffff;">
    <p style="margin:0 0 8px 0; font-weight:700; text-transform:uppercase; letter-spacing:0.02em; font-size:18px; opacity:0.95;">TOONHUB FIGURINES</p>
    <p style="margin:0 0 18px 0; font-size:13px; line-height:1.6; opacity:0.85;">The artwork is stunning, shipped fully prepared. The finish is a vision, the 3D craft is flawless. Many thanks! Wishing you the win. Order now.</p>
    <div style="display:flex; gap:12px; align-items:center;">
      <button onClick="{{ onPrev }}" aria-label="Previous" style="width:52px; height:52px; border-radius:9999px; background:transparent; border:2px solid #ffffff; color:#ffffff; display:flex; align-items:center; justify-content:center; cursor:pointer; transition: transform 150ms, background-color 150ms;" style-hover="transform:scale(1.08); backgroundColor:rgba(255,255,255,0.12)">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
      </button>
      <button onClick="{{ onNext }}" aria-label="Next" style="width:52px; height:52px; border-radius:9999px; background:transparent; border:2px solid #ffffff; color:#ffffff; display:flex; align-items:center; justify-content:center; cursor:pointer; transition: transform 150ms, background-color 150ms;" style-hover="transform:scale(1.08); backgroundColor:rgba(255,255,255,0.12)">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
      </button>
    </div>
  </div>

  <!-- Bottom-right link -->
  <a href="#" style="position:absolute; bottom:24px; right:24px; z-index:60; display:flex; align-items:center; gap:10px; font-family:'Anton', sans-serif; font-size:clamp(20px, 4vw, 56px); font-weight:400; color:#ffffff; opacity:0.95; letter-spacing:-0.02em; line-height:1; text-transform:uppercase; text-decoration:none; transition: opacity 200ms;" style-hover="opacity:1">
    <span>DISCOVER IT</span>
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
  </a>

</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;: {&quot;width&quot;: 1440, &quot;height&quot;: 900}}">
class Component extends DCLogic {
  state = { activeIndex: 0, isAnimating: false, isMobile: false };

  componentDidMount() {
    this._onResize = () => {
      const m = window.innerWidth < 640;
      if (m !== this.state.isMobile) this.setState({ isMobile: m });
    };
    this._onResize();
    window.addEventListener('resize', this._onResize);
    this.IMAGES.forEach(it => { const im = new Image(); im.src = it.src; });
  }
  componentWillUnmount() {
    window.removeEventListener('resize', this._onResize);
  }

  IMAGES = [
    { src: 'assets/2.png', bg: '#F4845F', panel: '#F79B7F' },
    { src: 'assets/3.png', bg: '#6BBF7A', panel: '#85CC92' },
    { src: 'assets/4.png', bg: '#E882B4', panel: '#ED9DC4' },
    { src: 'assets/1.png', bg: '#6EB5FF', panel: '#8DC4FF' },
  ];

  navigate(dir) {
    if (this.state.isAnimating) return;
    const cur = this.state.activeIndex;
    const next = dir === 'next' ? (cur + 1) % 4 : (cur + 3) % 4;
    this.setState({ isAnimating: true, activeIndex: next });
    setTimeout(() => this.setState({ isAnimating: false }), 650);
  }

  roleStyle(role, isMobile) {
    const base = 'position:absolute; aspect-ratio:0.6 / 1; transition: transform 650ms cubic-bezier(0.4,0,0.2,1), filter 650ms cubic-bezier(0.4,0,0.2,1), opacity 650ms cubic-bezier(0.4,0,0.2,1), left 650ms cubic-bezier(0.4,0,0.2,1); will-change: transform, filter, opacity;';
    if (role === 'center') {
      const scale = isMobile ? 1.0 : 1.25;
      return base + `transform: translateX(-50%) scale(${scale}); filter: none; opacity:1; z-index:20; left:50%; height:${isMobile?'50%':'72%'}; bottom:${isMobile?'22%':'6%'};`;
    }
    if (role === 'left') {
      return base + `transform: translateX(-50%) scale(1); filter: blur(2px); opacity:0.85; z-index:10; left:${isMobile?'20%':'30%'}; height:${isMobile?'14%':'22%'}; bottom:${isMobile?'32%':'14%'};`;
    }
    if (role === 'right') {
      return base + `transform: translateX(-50%) scale(1); filter: blur(2px); opacity:0.85; z-index:10; left:${isMobile?'80%':'70%'}; height:${isMobile?'14%':'22%'}; bottom:${isMobile?'32%':'14%'};`;
    }
    return base + `transform: translateX(-50%) scale(1); filter: blur(4px); opacity:1; z-index:5; left:50%; height:${isMobile?'11%':'17%'}; bottom:${isMobile?'32%':'14%'};`;
  }

  renderVals() {
    const { activeIndex, isMobile } = this.state;
    const active = this.IMAGES[activeIndex];
    const roles = {
      [activeIndex]: 'center',
      [(activeIndex + 3) % 4]: 'left',
      [(activeIndex + 1) % 4]: 'right',
      [(activeIndex + 2) % 4]: 'back',
    };
    const items = this.IMAGES.map((it, i) => ({
      src: it.src,
      style: this.roleStyle(roles[i], isMobile),
    }));
    return {
      items,
      activeBg: active.bg,
      activePanel: active.panel,
      onPrev: () => this.navigate('prev'),
      onNext: () => this.navigate('next'),
    };
  }
}
</script>
</body>
</html>
